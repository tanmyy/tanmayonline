<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>tanmay.online</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Montserrat',sans-serif;
color:white;
overflow:hidden;
}

/* button */

.toggle-btn{
padding:14px 30px;
font-size:16px;
font-weight:600;
background:#38bdf8;
border:none;
border-radius:10px;
cursor:pointer;
color:#0b132b;
transition:0.25s;
}

.toggle-btn:hover{
background:#0ea5e9;
}

/* content */

.content{
opacity:0;
text-align:center;
margin-top:40px;
}

.content.show{
opacity:1;
}

h1{
font-size:56px;
font-weight:700;
letter-spacing:4px;
margin-bottom:15px;
}

.subtitle{
font-size:20px;
opacity:0.85;
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.7;
}

/* social icons */

.social{
margin-top:25px;
display:flex;
gap:30px;
justify-content:center;
}

.social a{
color:white;
font-size:28px;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
color:#38bdf8;
}

/* mobile */

@media(max-width:768px){

h1{
font-size:36px;
}

.subtitle{
font-size:16px;
}

}

</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<button id="toggle" class="toggle-btn">Turn On Light</button>

<div id="content" class="content">

<h1>COMING SOON</h1>

<p class="subtitle">tanmay.online</p>

<div class="social">

<a href="https://instagram.com/tanmyykataria" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://linkedin.com/in/tanmaykataria" target="_blank">
<i class="fab fa-linkedin"></i>
</a>

</div>

</div>

<script>

const btn = document.getElementById("toggle")
const content = document.getElementById("content")

let lightOn=false
let stars=[]

btn.onclick=function(){

lightOn=!lightOn

if(lightOn){

document.body.style.background="#0b132b"

content.classList.add("show")

btn.innerText="OFF"

createStars()

}else{

document.body.style.background="black"

content.classList.remove("show")

btn.innerText="ON"

removeStars()

}

}

function createStars(){

for(let i=0;i<80;i++){

let s=document.createElement("div")
s.className="star"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

let size=Math.random()*3+1
s.style.width=size+"px"
s.style.height=size+"px"

let speed=Math.random()*40+20

s.style.animation=`float ${speed}s linear infinite`

document.body.appendChild(s)

stars.push(s)

}

}

function removeStars(){

stars.forEach(s=>s.remove())

stars=[]

}

</script>

</body>

</html>
