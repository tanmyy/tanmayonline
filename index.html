<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>tanmay.online</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Montserrat', sans-serif;
color:white;
overflow:hidden;
transition:1s;
}

/* string */

.string{
position:absolute;
top:0;
width:3px;
height:160px;
background:#aaa;
transform-origin:top center;
}

/* bulb */

.bulb{
width:70px;
cursor:pointer;
position:absolute;
top:160px;
transform-origin:top center;
transition:0.2s;
}

/* glow when light on */

.bulb.on{
box-shadow:
0 0 40px #fff,
0 0 80px #fff,
0 0 150px rgba(255,255,255,0.7);
}

/* text */

.content{
opacity:0;
transition:1s;
text-align:center;
margin-top:120px;
}

.content.show{
opacity:1;
}

h1{
font-size:54px;
letter-spacing:4px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.6;
}

/* social icons */

.social{
margin-top:25px;
display:flex;
gap:30px;
justify-content:center;
}

.social a{
color:white;
font-size:28px;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
color:#3a86ff;
}

</style>

<script src="https://kit.fontawesome.com/4b8b8b9c7f.js" crossorigin="anonymous"></script>

</head>

<body>

<div id="string" class="string"></div>

<img id="bulb" class="bulb"
src="image-1ORQgJEOeHL8zTZtZJnfhRlNAu9Urh (1).png">

<div id="content" class="content">

<h1>COMING SOON</h1>

<p class="subtitle">tanmay.online</p>

<div class="social">

<a href="https://instagram.com/YOURUSERNAME" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://linkedin.com/in/YOURUSERNAME" target="_blank">
<i class="fab fa-linkedin"></i>
</a>

</div>

</div>

<script>

const bulb = document.getElementById("bulb")
const string = document.getElementById("string")
const content = document.getElementById("content")

let lightOn = false

/* toggle light */

bulb.onclick = function(){

lightOn = !lightOn

if(lightOn){

bulb.classList.add("on")
document.body.style.background =
"radial-gradient(circle,#1c2541 0%,#000 70%)"

content.classList.add("show")

}else{

bulb.classList.remove("on")
document.body.style.background = "black"

content.classList.remove("show")

}

}

/* drag bulb physics */

let dragging=false

bulb.addEventListener("mousedown",()=>{
dragging=true
})

document.addEventListener("mouseup",()=>{
dragging=false
})

document.addEventListener("mousemove",(e)=>{

if(!dragging) return

let center=window.innerWidth/2
let offset=e.clientX-center

let rotate=offset/20

bulb.style.transform="rotate("+rotate+"deg)"
string.style.transform="rotate("+rotate+"deg)"

})

/* stars */

for(let i=0;i<60;i++){

let s=document.createElement("div")
s.className="star"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

document.body.appendChild(s)

}

</script>

</body>

</html>
