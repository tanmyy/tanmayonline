<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>tanmay.online</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Montserrat', sans-serif;
color:white;
overflow:hidden;
}

/* lamp container */

.lamp{
position:absolute;
top:0;
left:50%;
transform-origin:top center;
}

/* string */

.string{
width:3px;
height:160px;
background:#ccc;
margin:0 auto;
}

/* bulb */

.bulb{
width:70px;
display:block;
margin:0 auto;
cursor:pointer;
transform: rotate(180deg);
}

/* glow */

.bulb.on{
filter:drop-shadow(0 0 20px white)
drop-shadow(0 0 40px white)
drop-shadow(0 0 80px rgba(255,255,255,0.6));
}

/* text */

.content{
opacity:0;
transition:0.6s;
text-align:center;
margin-top:180px;
}

.content.show{
opacity:1;
}

h1{
font-size:56px;
letter-spacing:4px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.7;
}

/* social icons */

.social{
margin-top:25px;
display:flex;
gap:30px;
justify-content:center;
}

.social a{
color:white;
font-size:28px;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
color:#3a86ff;
}

/* mobile */

@media(max-width:768px){

h1{
font-size:36px;
}

.bulb{
width:60px;
}

}

</style>

<script src="https://kit.fontawesome.com/4b8b8b9c7f.js" crossorigin="anonymous"></script>

</head>

<body>

<div id="lamp" class="lamp">

<div class="string"></div>

<img id="bulb" class="bulb" src="bulb.png">

</div>

<div id="content" class="content">

<h1>COMING SOON</h1>

<p class="subtitle">tanmay.online</p>

<div class="social">

<a href="https://instagram.com/YOURUSERNAME" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://linkedin.com/in/YOURUSERNAME" target="_blank">
<i class="fab fa-linkedin"></i>
</a>

</div>

</div>

<script>

const lamp = document.getElementById("lamp")
const bulb = document.getElementById("bulb")
const content = document.getElementById("content")

let lightOn=false
let stars=[]

/* toggle light */

bulb.onclick = function(){

lightOn=!lightOn

if(lightOn){

bulb.classList.add("on")
document.body.style.background="#0b132b"

content.classList.add("show")

createStars()

}else{

bulb.classList.remove("on")
document.body.style.background="black"

content.classList.remove("show")

removeStars()

}

}

/* stars */

function createStars(){

for(let i=0;i<60;i++){

let s=document.createElement("div")
s.className="star"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

document.body.appendChild(s)

stars.push(s)

}

}

function removeStars(){

stars.forEach(s=>s.remove())
stars=[]

}

/* pendulum drag */

let dragging=false

lamp.addEventListener("mousedown",()=>dragging=true)
document.addEventListener("mouseup",()=>dragging=false)

document.addEventListener("mousemove",(e)=>{

if(!dragging) return

let center=window.innerWidth/2
let offset=e.clientX-center

let rotate=offset/15

lamp.style.transform="rotate("+rotate+"deg)"

})

</script>

</body>
</html>
