<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>tanmay.online</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Montserrat', sans-serif;
color:white;
overflow:hidden;
}

/* bulb */

.lamp{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
}

.bulb{
width:90px;
cursor:pointer;
transform:rotate(180deg);
}

/* glow animation */

.bulb.on{
animation:glow 2s infinite ease-in-out;
}

@keyframes glow{

0%{
filter:drop-shadow(0 0 20px white)
drop-shadow(0 0 40px white)
drop-shadow(0 0 70px rgba(255,255,255,0.6));
}

50%{
filter:drop-shadow(0 0 30px white)
drop-shadow(0 0 60px white)
drop-shadow(0 0 100px rgba(255,255,255,0.8));
}

100%{
filter:drop-shadow(0 0 20px white)
drop-shadow(0 0 40px white)
drop-shadow(0 0 70px rgba(255,255,255,0.6));
}

}

/* content */

.content{
opacity:0;
transition:0.6s;
text-align:center;
margin-top:160px;
}

.content.show{
opacity:1;
}

/* title */

h1{
font-size:64px;
font-weight:700;
letter-spacing:4px;
margin-bottom:15px;
}

/* subtitle */

.subtitle{
font-size:24px;
opacity:0.9;
font-weight:500;
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.7;
}

/* social icons */

.social{
margin-top:30px;
display:flex;
gap:30px;
justify-content:center;
}

.social a{
color:white;
font-size:30px;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
color:#3a86ff;
}

/* mobile */

@media(max-width:768px){

h1{
font-size:40px;
}

.subtitle{
font-size:18px;
}

.bulb{
width:70px;
}

}

</style>

<script src="https://kit.fontawesome.com/4b8b8b9c7f.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="lamp">
<img id="bulb" class="bulb" src="bulb.png">
</div>

<div id="content" class="content">

<h1>COMING SOON</h1>

<p class="subtitle">tanmay.online</p>

<div class="social">

<a href="https://instagram.com/YOURUSERNAME" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://linkedin.com/in/YOURUSERNAME" target="_blank">
<i class="fab fa-linkedin"></i>
</a>

</div>

</div>

<script>

const bulb = document.getElementById("bulb")
const content = document.getElementById("content")

let lightOn=false
let stars=[]

bulb.onclick=function(){

lightOn=!lightOn

if(lightOn){

bulb.classList.add("on")
document.body.style.background="#0b132b"

content.classList.add("show")

createStars()

}else{

bulb.classList.remove("on")
document.body.style.background="black"

content.classList.remove("show")

removeStars()

}

}

/* stars */

function createStars(){

for(let i=0;i<60;i++){

let s=document.createElement("div")
s.className="star"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

document.body.appendChild(s)

stars.push(s)

}

}

function removeStars(){

stars.forEach(s=>s.remove())
stars=[]

}

</script>

</body>
</html>
